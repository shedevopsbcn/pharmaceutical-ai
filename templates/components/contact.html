<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Ajuda - IA FARMACIA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Poppins', Arial, sans-serif; }

        .contact-wrapper {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px 20px 60px 20px;
        }

        .contact-wrapper h2 {
            margin-bottom: 5px;
        }

        .contact-wrapper p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #2b6cb0;
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .submit-btn {
            background-color: #2b6cb0;
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background-color: #1a4971;
        }

        .success-message {
            display: none;
            background: #e6ffed;
            border: 1px solid #68d391;
            color: #276749;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        {% include 'components/sidebar.html' %}
        <div class="main-content">
            {% include 'components/header.html' %}

            <div class="contact-wrapper">
                <h2>Ajuda</h2>
                <p>Tens alguna pregunta o problema? Omple el formulari i et respondrem el més aviat possible.</p>

                {% if success %}
                <div class="success-message" style="display: block;">
                    ✓ El teu missatge s'ha enviat correctament. Et respondrem aviat!
                </div>
                {% endif %}

                <form method="POST" action="/ajuda">
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" placeholder="El teu nom" required />
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="correo">Correo</label>
                            <input type="email" id="correo" name="correo" placeholder="El teu correu" required />
                        </div>
                        <div class="form-group">
                            <label for="telefon">Telefon</label>
                            <input type="text" id="telefon" name="telefon" placeholder="El teu telèfon" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="missatge">Missatge</label>
                        <textarea id="missatge" name="missatge" placeholder="Descriu el teu problema o pregunta..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">ENVIAR</button>
                </form>
            </div>

        </div>
    </div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
