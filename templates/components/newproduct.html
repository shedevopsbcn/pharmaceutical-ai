<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>IA FARMACIA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/newproduct.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; }
    </style>
</head>
<body>
    <div class="main-container">
      {% include 'components/sidebar.html' %}
      <div class="main-content">
        {% include 'components/header.html' %}
        <div style="margin-top: 60px;">
            <h3>Completa aquí</h3>
            
            <form class="form-container" id="new-product-form" action="/submit" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="id_numero">Número (ID intern)</label>
                        <input type="text" id="id_numero" name="id_numero" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="nom_producte">Nom del Producte</label>
                        <input type="text" id="nom_producte" name="nom_producte" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="quantitat">Quantitat</label>
                        <input type="text" id="quantitat" name="quantitat" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="milligrams">Mil·ligrams</label>
                        <input type="text" id="milligrams" name="milligrams" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="preu">Preu per unitat</label>
                        <input type="text" id="preu" name="preu" required />
                    </div>

                    <!-- NEW FIELD: Wholesale Cost added right below Retail Price -->
                    <div class="form-group">
                        <label for="preu_compra">Cost d'adquisició (€)</label>
                        <input type="number" step="0.01" id="preu_compra" name="preu_compra" placeholder="0.00" required class="form-input" />
                    </div>
                    
                    <div class="form-group">
                    <label for="caducitat">Data de caducitat</label>
                    <!-- We've explicitly added the min and max attributes to try and force the calendar -->
                    <input type="date" id="caducitat" name="caducitat" min="2020-01-01" max="2050-12-31" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="proveedor">Nom de Proveedor</label>
                        <input type="text" id="proveedor" name="proveedor" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Categories</label>
                        <select id="category" name="category">
                            <option selected disabled>Selecciona aquí</option>
                            <option value="cap">Cap</option>
                            <option value="tronc">Tronc</option>
                            <option value="brac">Braç</option>
                            <option value="peu">Peu</option>
                            <option value="intestins">Intestins</option>
                        </select>
                    </div>
                </div>
        
                <div class="button-wrapper">
                    <button type="submit">Afegeix</button>
                </div>
            </form>
        </div>
      </div>
    </div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
