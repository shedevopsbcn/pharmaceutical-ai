{% block head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
  <script src="https://unpkg.com/lucide@latest"></script>
{% endblock %}

<nav class="sidebar">
    <div class="sidebar-top">
        <img 
            src="../static/images/Farmacia-IA.png"
            alt="Symptom Lookup"
            class="sidebar-top-image"
        />
        <h2>IA Farmàcia</h2>
    </div>
    
    <ul class="sidebar-list">
        <li class="sidebar-list-item {% if active_page == 'home' %}active{% endif %}">
            <a href="{{ url_for('home') }}">
              <i data-lucide="file-text"></i>
              Tauler de control
            </a>
        </li>
        
        <!-- NEW AI ASSISTANT LINK ADDED HERE -->
        <li class="sidebar-list-item {% if active_page == 'symptomchecker' %}active{% endif %}">
            <a href="{{ url_for('symptom_checker') }}" class="sidebar-link">
              <i data-lucide="stethoscope"></i>
              Symptom Lookup
            </a>
        </li>
        <!-- END OF NEW LINK -->

        <li class="sidebar-list-item {% if active_page == 'analysis' %}active{% endif %}">
            <a href="{{ url_for('analysis') }}" class="sidebar-link">
                <i data-lucide="bar-chart-2"></i> Analysis
            </a>
        </li>
          
        <li class="sidebar-list-item {% if active_page == 'inventory' %}active{% endif %}">
            <a href="{{ url_for('inventory') }}">
              <i data-lucide="file-text"></i>
              Inventory
            </a>
        </li>
        
        <li class="sidebar-list-item {% if active_page == 'suppliers' %}active{% endif %}">
            <a href="{{ url_for('suppliers') }}">
              <i data-lucide="shopping-bag"></i>
              Suppliers
            </a>
        </li>
        
        <li class="sidebar-list-item {% if active_page == 'income' %}active{% endif %}">
            <a href="{{ url_for('income') }}">
              <i data-lucide="banknote"></i>
              Ingressos
            </a>
        </li>
        
        <li class="sidebar-list-item {% if active_page == 'promotion' %}active{% endif %}">
            <a href="{{ url_for('promotion') }}">
              <i data-lucide="file-text"></i>
              Caducitat
            </a>
        </li>
        
        <li class="sidebar-list-item">
            <i data-lucide="settings"></i><a href="#">Configuració</a>
        </li>
    </ul>

    <hr>

    <ul class="sidebar-list">
        <!-- Your Log Out Fix -->
        <li class="sidebar-list-item">
            <i data-lucide="log-out"></i><a href="{{ url_for('logout') }}">Tancar la sessió</a>
        </li>
        
        <!-- Your Coworker's Help Route Fix -->
        <li class="sidebar-list-item {% if active_page == 'ajuda' %}active{% endif %}">
            <a href="{{ url_for('ajuda') }}">
                <i data-lucide="circle-help"></i> Ajuda
            </a>
        </li>
    </ul>
    
</nav>
