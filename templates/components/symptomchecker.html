<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Symptom Lookup - IA FARMACIA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', Arial, sans-serif; }

        .main-content {
            overflow-y: auto;
            height: 100vh;
        }

        .lookup-wrapper {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .lookup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .lookup-header h2 {
            margin: 0;
            color: #333;
        }

        .lookup-header p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-bar input {
            flex: 1;
            padding: 14px 18px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }

        .search-bar input:focus {
            border-color: #2b6cb0;
        }

        .search-bar button {
            padding: 14px 28px;
            background: #2b6cb0;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: background 0.3s;
        }

        .search-bar button:hover {
            background: #1a4971;
        }

        .search-bar button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }

        .results-section {
            display: none;
        }

        .results-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .med-card {
            background: white;
            border: 1px solid #eaeaea;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .med-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .med-card h4 {
            margin: 0 0 8px 0;
            color: #333;
            font-size: 14px;
        }

        .med-card p {
            margin: 0;
            color: #666;
            font-size: 12px;
        }

        .med-card .lab {
            margin-top: 10px;
            font-size: 11px;
            color: #999;
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 40px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-container">
        {% include 'components/sidebar.html' %}
        <div class="main-content">
            {% include 'components/header.html' %}

            <div class="lookup-wrapper">
                <div class="lookup-header">
                    <h2>Symptom Lookup</h2>
                    <p>Escriu un símptoma per trobar medicaments recomanats de la base de dades CIMA.</p>
                </div>

                <div class="search-bar">
                    <input type="text" id="symptom-input" placeholder="Ex: dolor de cap, febre, tos..." autocomplete="off" />
                    <button id="search-btn">Cercar</button>
                </div>

                <div class="loading" id="loading">
                    Cercant medicaments...
                </div>

                <div class="results-section" id="results-section">
                    <h3 id="results-title"></h3>
                    <div class="results-grid" id="results-grid"></div>
                </div>
            </div>

        </div>
    </div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();

    const searchBtn = document.getElementById('search-btn');
    const symptomInput = document.getElementById('symptom-input');
    const resultsSection = document.getElementById('results-section');
    const resultsGrid = document.getElementById('results-grid');
    const resultsTitle = document.getElementById('results-title');
    const loading = document.getElementById('loading');

    searchBtn.addEventListener('click', doSearch);
    symptomInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
        const symptom = symptomInput.value.trim();
        if (!symptom) return;

        searchBtn.disabled = true;
        resultsSection.style.display = 'none';
        loading.style.display = 'block';
        resultsGrid.innerHTML = '';

        try {
            const formData = new FormData();
            formData.append('symptom', symptom);

            const response = await fetch('/api-symptom-search', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            loading.style.display = 'none';

            if (data.resultados && data.resultados.length > 0) {
                const top = data.resultados.slice(0, 12);
                resultsTitle.textContent = `${top.length} medicaments trobats per "${symptom}"`;
                
                top.forEach(med => {
                    const card = document.createElement('div');
                    card.className = 'med-card';
                    card.innerHTML = `
                        <h4>${med.nombre}</h4>
                        <p><strong>Nº Registre:</strong> ${med.nregistro}</p>
                        <div class="lab">${med.labtitular || 'Laboratori desconegut'}</div>
                    `;
                    resultsGrid.appendChild(card);
                });

                resultsSection.style.display = 'block';
            } else {
                resultsTitle.textContent = `No s'han trobat medicaments per "${symptom}"`;
                resultsGrid.innerHTML = '<div class="empty-state"><p>Prova amb un altre terme de cerca.</p></div>';
                resultsSection.style.display = 'block';
            }

        } catch (error) {
            loading.style.display = 'none';
            resultsTitle.textContent = 'Error de connexió. Torna-ho a intentar.';
            resultsSection.style.display = 'block';
        }

        searchBtn.disabled = false;
        symptomInput.focus();
    }
</script>
</body>
</html>
